# Render.com deployment blueprint
# Deploy: connect this repo on render.com → it auto-detects this file

services:
  - type: web
    name: revcast-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/data/revcast.db
    disk:
      name: revcast-data
      mountPath: /opt/render/project/data
      sizeGB: 1
    healthCheckPath: /health

  - type: web
    name: revcast-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: revcast-api
          property: host
