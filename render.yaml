# Render.com deployment blueprint
# Deploy: connect this repo on render.com → "New" → "Blueprint" → select repo

services:
  - type: web
    name: revcast-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /tmp/revcast.db
      - key: CORS_ORIGINS
        value: https://revcast-frontend.onrender.com
    healthCheckPath: /health

  - type: web
    name: revcast-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://revcast-api.onrender.com
